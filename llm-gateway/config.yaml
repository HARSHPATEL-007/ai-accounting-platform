# LiteLLM Proxy Configuration
# Unified API for OpenAI, Anthropic, and local models
# With token cost tracking and fallback routing

model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      rpm: 100
      tpm: 100000
    model_info:
      cost_per_token_input: 0.005
      cost_per_token_output: 0.015
      cost_per_token_cached: 0.0025
      base_model: gpt-4o

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      rpm: 500
      tpm: 500000
    model_info:
      cost_per_token_input: 0.00015
      cost_per_token_output: 0.0006
      base_model: gpt-4o-mini

  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
      rpm: 50
      tpm: 50000
    model_info:
      cost_per_token_input: 0.015
      cost_per_token_output: 0.075
      base_model: claude-3-opus

  - model_name: claude-3-sonnet
    litellm_params:
      model: anthropic/claude-3-sonnet-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
      rpm: 200
      tpm: 200000
    model_info:
      cost_per_token_input: 0.003
      cost_per_token_output: 0.015
      base_model: claude-3-sonnet

  - model_name: llama-3-70b-local
    litellm_params:
      model: vllm/llama-3-70b-instruct
      api_base: http://vllm:8000/v1
      rpm: 100
      tpm: 100000
    model_info:
      cost_per_token_input: 0.0
      cost_per_token_output: 0.0
      base_model: meta-llama/Llama-3-70b-instruct

  # Fallback models for PII-sensitive workloads (local only)
  - model_name: pii-safe-model
    litellm_params:
      model: vllm/llama-3-70b-instruct
      api_base: http://vllm:8000/v1
      rpm: 100
    model_info:
      cost_per_token_input: 0.0
      cost_per_token_output: 0.0
      base_model: meta-llama/Llama-3-70b-instruct

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  proxy_batch_write_at: 60
  alert_to_webhook_url: os.environ/ALERT_WEBHOOK_URL
  alert_types:
    - budget_alerts
    - model_exceptions
    - db_exceptions
    - rate_limit_alerts
    - slow_model_alerts

  # Budget tracking per client
  max_budget: 1000.0  # Global max budget in USD
  budget_duration: 30d

  # Fallback routing
  fallbacks:
    - gpt-4o:
        - claude-3-opus
        - gpt-4o-mini
    - claude-3-opus:
        - gpt-4o
        - llama-3-70b-local
    - gpt-4o-mini:
        - claude-3-sonnet
        - llama-3-70b-local

  # Context window fallback
  context_window_fallbacks:
    - gpt-4o-mini:
        - gpt-4o
        - claude-3-opus

  # Rate limit strategy
  rate_limit:
    strategy: " sliding-window"
    redis_host: os.environ/REDIS_HOST
    redis_port: 6379
    redis_password: os.environ/REDIS_PASSWORD

  # Retry config
  num_retries: 3
  retry_after: 1
  timeout: 30

  # Logging
  log_level: INFO
  log_file: /var/log/litellm/proxy.log

  # Observability
  success_callback: ["langsmith", "prometheus"]
  failure_callback: ["langsmith", "prometheus", "slack"]
  service_callback: ["langsmith"]

  # Metadata injection for cost tracking
  metadata:
    generation_name: "accounting_platform"
    project_name: "ai-native-accounting"

# Router settings
router_settings:
  routing_strategy: "latency-based"
  routing_strategy_args:
    ttl: 3600
  model_group_alias:
    default: gpt-4o
    fast: gpt-4o-mini
    reasoning: claude-3-opus
    local: llama-3-70b-local
    pii-safe: pii-safe-model

# Rate limits per model
litellm_settings:
  drop_params: true
  success_callback: ["langsmith"]
  failure_callback: ["langsmith"]
  callbacks: ["prometheus"]

  # Guardrails (basic - full guardrails in guardrails-service)
  pre_call_rules:
    - type: "max_tokens"
      value: 4096
    - type: "max_input_tokens"
      value: 8192

  # Content moderation
  content_policy:
    default:
      blocked_topics:
        - "non-accounting queries"
        - "investment advice"
        - "medical advice"
