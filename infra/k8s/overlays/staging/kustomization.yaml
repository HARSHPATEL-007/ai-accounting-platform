apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: accounting-platform-staging

resources:
  - ../../base/namespace.yaml
  - ../../base/configmap.yaml
  - ../../base/ai-orchestrator.yaml
  - ../../base/ledger-processor.yaml
  - ../../base/postgres.yaml
  - ../../base/network-policy.yaml

namePrefix: staging-

replicas:
  - name: ai-orchestrator
    count: 2
  - name: ledger-processor
    count: 3

images:
  - name: accounting-registry/ai-orchestrator
    newTag: staging-latest
  - name: accounting-registry/ledger-processor
    newTag: staging-latest

patches:
  - target:
      kind: Deployment
      name: ai-orchestrator
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "staging"

configMapGenerator:
  - name: accounting-platform-config
    behavior: merge
    literals:
      - APP_ENV=staging
      - LOG_LEVEL=debug
      - RAG_SERVICE_URL=http://rag-service-staging:8000
