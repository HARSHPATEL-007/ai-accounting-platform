apiVersion: v1
kind: ConfigMap
metadata:
  name: accounting-platform-config
  namespace: accounting-platform
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  RAG_SERVICE_URL: "http://rag-service:8000"
  LEDGER_PROCESSOR_URL: "http://ledger-processor:8080"
  OCR_PIPELINE_URL: "http://ocr-pipeline:8000"
  GUARDRAILS_SERVICE_URL: "http://guardrails-service:8000"
  TEMPORAL_HOST: "temporal-frontend:7233"
  REDIS_URL: "redis://redis-cluster:6379/0"
  JAEGER_ENDPOINT: "http://jaeger-collector:14268/api/traces"
