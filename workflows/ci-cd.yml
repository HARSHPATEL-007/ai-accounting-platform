name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  TERRAFORM_VERSION: "1.7.0"
  KUBECTL_VERSION: "1.29.0"

jobs:
  # ============================================
  # PHASE 1: Lint & Test
  # ============================================
  lint-test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ai-orchestrator, rag-service, ocr-pipeline, guardrails-service, valuation-engine, workflow-engine, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio mypy black isort flake8 bandit safety

      - name: Lint with Black
        run: |
          cd ${{ matrix.service }}
          black --check app/

      - name: Lint with isort
        run: |
          cd ${{ matrix.service }}
          isort --check-only app/

      - name: Type check with mypy
        run: |
          cd ${{ matrix.service }}
          mypy app/ --strict || true

      - name: Security scan with Bandit
        run: |
          cd ${{ matrix.service }}
          bandit -r app/ -f json -o bandit-report.json || true

      - name: Dependency vulnerability scan
        run: |
          cd ${{ matrix.service }}
          safety check || true

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          pytest tests/ -v --cov=app --cov-report=xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  lint-test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: ledger-processor
          args: --timeout=5m

      - name: Run tests
        run: |
          cd ledger-processor
          go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ledger-processor/coverage.out
          flags: ledger-processor

  lint-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package.json

      - name: Install dependencies
        run: |
          cd web-dashboard
          npm ci

      - name: Lint with ESLint
        run: |
          cd web-dashboard
          npm run lint

      - name: Type check with TypeScript
        run: |
          cd web-dashboard
          npm run type-check

      - name: Run tests
        run: |
          cd web-dashboard
          npm test -- --coverage --watchAll=false || true

      - name: Build
        run: |
          cd web-dashboard
          npm run build

  # ============================================
  # PHASE 2: Security Scan
  # ============================================
  security-scan:
    needs: [lint-test-python, lint-test-go, lint-test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scanner (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # ============================================
  # PHASE 3: Build & Push Containers
  # ============================================
  build-and-push:
    needs: [security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ai-orchestrator, rag-service, ocr-pipeline, guardrails-service, valuation-engine, workflow-engine, notification-service, ledger-processor]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'

  # ============================================
  # PHASE 4: Deploy to Staging
  # ============================================
  deploy-staging:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name accounting-platform-staging --region ${{ env.AWS_REGION }}

      - name: Deploy to staging
        run: |
          cd infra/k8s/overlays/staging
          kustomize edit set image             ai-orchestrator=${{ env.ECR_REGISTRY }}/ai-orchestrator:${{ github.sha }}             ledger-processor=${{ env.ECR_REGISTRY }}/ledger-processor:${{ github.sha }}             ocr-pipeline=${{ env.ECR_REGISTRY }}/ocr-pipeline:${{ github.sha }}             rag-service=${{ env.ECR_REGISTRY }}/rag-service:${{ github.sha }}             guardrails-service=${{ env.ECR_REGISTRY }}/guardrails-service:${{ github.sha }}             valuation-engine=${{ env.ECR_REGISTRY }}/valuation-engine:${{ github.sha }}             workflow-engine=${{ env.ECR_REGISTRY }}/workflow-engine:${{ github.sha }}             notification-service=${{ env.ECR_REGISTRY }}/notification-service:${{ github.sha }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ai-orchestrator -n accounting-platform --timeout=300s
          kubectl rollout status deployment/ledger-processor -n accounting-platform --timeout=300s

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging-api.accounting-platform.in/health || exit 1

  # ============================================
  # PHASE 5: Deploy to Production
  # ============================================
  deploy-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name accounting-platform-prod --region ${{ env.AWS_REGION }}

      - name: Deploy to production (canary)
        run: |
          cd infra/k8s/overlays/prod
          kustomize edit set image             ai-orchestrator=${{ env.ECR_REGISTRY }}/ai-orchestrator:${{ github.sha }}             ledger-processor=${{ env.ECR_REGISTRY }}/ledger-processor:${{ github.sha }}             ocr-pipeline=${{ env.ECR_REGISTRY }}/ocr-pipeline:${{ github.sha }}             rag-service=${{ env.ECR_REGISTRY }}/rag-service:${{ github.sha }}             guardrails-service=${{ env.ECR_REGISTRY }}/guardrails-service:${{ github.sha }}             valuation-engine=${{ env.ECR_REGISTRY }}/valuation-engine:${{ github.sha }}             workflow-engine=${{ env.ECR_REGISTRY }}/workflow-engine:${{ github.sha }}             notification-service=${{ env.ECR_REGISTRY }}/notification-service:${{ github.sha }}
          kustomize build . | kubectl apply -f -

      - name: Canary deployment (10% traffic)
        run: |
          kubectl patch virtualservice ai-orchestrator             -n accounting-platform             --type merge             -p '{"spec":{"http":[{"route":[{"destination":{"host":"ai-orchestrator","subset":"v2"},"weight":10},{"destination":{"host":"ai-orchestrator","subset":"v1"},"weight":90}]}]}}'

      - name: Wait for canary health check
        run: |
          sleep 60
          curl -f https://api.accounting-platform.in/health || exit 1

      - name: Full rollout (if canary passes)
        run: |
          kubectl patch virtualservice ai-orchestrator             -n accounting-platform             --type merge             -p '{"spec":{"http":[{"route":[{"destination":{"host":"ai-orchestrator","subset":"v2"},"weight":100}]}]}}'
          kubectl rollout status deployment/ai-orchestrator -n accounting-platform --timeout=300s

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deployment completed: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
