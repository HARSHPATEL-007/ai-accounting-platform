apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: accounting-platform
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.54
          ports:
            - containerPort: 16686
              name: query
            - containerPort: 14268
              name: collector
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: accounting-platform
spec:
  type: ClusterIP
  ports:
    - port: 16686
      targetPort: 16686
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: accounting-platform
spec:
  type: ClusterIP
  ports:
    - port: 14268
      targetPort: 14268
  selector:
    app: jaeger
